tasks:
  pipeline:
    cmd: "poetry run python scripts/run.py"

  test:
    cmd: "poetry run pytest"

  lint:
    cmd: "poetry run ruff check ."

  format:
    cmd: "poetry run ruff format ."

  typecheck:
    cmd: "pyright ."

  pg-shell:
    cmd: "poetry run psql"

  db-recreate:
    - cmd:
        docker exec  -e PGPASSWORD="${PGPASSWORD}" insight_2_profit_postgres_1 psql -U ${PGUSER} -d postgres -c "DROP DATABASE ${PGDATABASE};"
    - cmd:
        docker exec  -e PGPASSWORD="${PGPASSWORD}" insight_2_profit_postgres_1 psql -U ${PGUSER} -d postgres -c "CREATE DATABASE ${PGDATABASE};"
